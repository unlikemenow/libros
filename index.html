  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    min-height: 100vh;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    transition: background .4s ease, color .3s ease;
  }

  /* Ambient blobs */
  body::before, body::after {
    content: ''; position: fixed; border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(100px);
    transition: background .4s ease;
  }
  body::before { width: 600px; height: 600px; background: var(--blob1); top: -100px; right: -150px; }
  body::after { width: 500px; height: 500px; background: var(--blob2); bottom: -100px; left: -100px; }

  .container { max-width: 680px; margin: 0 auto; padding: calc(48px + env(safe-area-inset-top, 0px)) 20px calc(100px + env(safe-area-inset-bottom, 0px)); position: relative; z-index: 1; }

  /* Glass base with rotating glow border */
  .glass {
    position: relative;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow), var(--glass-inset);
    border-radius: 18px;
    transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s ease, background .2s ease, border-color .3s;
    overflow: hidden;
  }
  .glass::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: conic-gradient(
      from var(--glow-angle, 0deg),
      transparent 0%, var(--glow-1) 10%, var(--glow-2) 20%,
      transparent 30%, transparent 70%,
      var(--glow-3) 80%, var(--glow-4) 90%, transparent 100%
    );
    opacity: 0;
    transition: opacity .4s ease;
    z-index: 0;
    animation: none;
  }
  .glass::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 16px;
    background: var(--glass-inner);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    z-index: 1;
    transition: background .3s;
  }
  .glass:hover::before {
    opacity: 1;
    animation: glowSpin 3s linear infinite;
  }
  .glass:hover::after {
    background: var(--glass-bg-hover);
  }
  .glass:hover {
    border-color: var(--glass-hover-border-color);
    box-shadow: var(--glass-hover-shadow), var(--glass-hover-inset);
  }

  @property --glow-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes glowSpin {
    0% { --glow-angle: 0deg; }
    100% { --glow-angle: 360deg; }
  }

  /* Header */
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; position: relative; }
  .logo {
    width: 48px; height: 48px; cursor: pointer; flex-shrink: 0;
    transition: transform .3s cubic-bezier(.16,1,.3,1);
    position: relative;
  }
  .logo img {
    width: 100%; height: 100%; object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
    position: relative; z-index: 1;
  }
  .logo::before {
    content: '';
    position: absolute;
    inset: 0px;
    border-radius: 50%;
    background: conic-gradient(
      from var(--glow-angle, 0deg),
      transparent 0%, var(--glow-logo-1) 10%, var(--glow-logo-2) 20%,
      transparent 30%, transparent 70%,
      var(--glow-logo-3) 80%, var(--glow-logo-4) 90%, transparent 100%
    );
    opacity: 0;
    transition: opacity .4s ease;
    filter: blur(5px);
    z-index: 0;
    animation: none;
  }
  .logo:hover::before { opacity: 1; animation: glowSpin 2.5s linear infinite; }
  h1 {
    font-size: 2.6rem; font-weight: 800; letter-spacing: 0.12em;
    background: var(--title-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-variant: small-caps;
  }
  .subtitle { color: var(--text-muted); font-size: 0.88rem; margin-top: 3px; margin-bottom: 28px; }

  /* Theme toggle */
  .theme-toggle {
    width: 32px; height: 32px; border-radius: 10px;
    border: 1px solid var(--toggle-border);
    background: var(--toggle-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    color: var(--toggle-color);
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .25s ease;
  }
  .theme-toggle:hover {
    background: var(--toggle-hover-bg);
    transform: scale(1.08);
  }

  /* Stats */
  .stats { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat { flex: 1; padding: 20px 14px; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 90px; cursor: pointer; }
  .stat-inner { position: relative; z-index: 2; }
  .stat-num { font-size: 2.4rem; font-weight: 700; color: var(--stat-num); letter-spacing: -0.03em; }
  .stat-text { font-size: 1.1rem; font-weight: 600; color: var(--stat-text); letter-spacing: -0.01em; line-height: 1.25; }
  .stat-label { font-size: 0.65rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 6px; }

  /* Search */
  .search-wrap { position: sticky; top: 0; z-index: 20; padding: 10px 0; }
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 6px 6px 18px;
    background: var(--search-bg);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border: 1px solid var(--search-border);
    box-shadow: var(--search-shadow), var(--glass-inset);
    border-radius: 16px;
    transition: background .2s, box-shadow .2s;
  }
  .search-bar:hover, .search-bar:focus-within {
    background: var(--search-bg-hover);
    box-shadow: var(--search-shadow-hover), var(--glass-hover-inset);
  }
  .search {
    flex: 1; padding: 10px 0; font-size: 0.92rem;
    border: none; background: transparent; color: var(--text-primary); outline: none;
  }
  .search::placeholder { color: var(--text-fainter); }
  .add-btn {
    width: 36px; height: 36px; border-radius: 12px; border: none;
    background: var(--accent-bg); color: var(--accent);
    font-size: 1.5rem; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0 0 2px 0;
    transition: all .25s cubic-bezier(.16,1,.3,1); flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .add-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    background: conic-gradient(
      from var(--glow-angle, 0deg),
      transparent 0%, var(--glow-btn-1) 15%, transparent 30%,
      transparent 70%, var(--glow-btn-2) 85%, transparent 100%
    );
    opacity: 0;
    transition: opacity .3s;
    z-index: 0;
    animation: none;
  }
  .add-btn::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 10px;
    background: var(--accent-bg);
    z-index: 1;
    transition: background .2s;
  }
  .add-btn:hover { color: var(--accent-dark); transform: scale(1.08); border-color: transparent; }
  .add-btn:hover::before { opacity: 1; animation: glowSpin 2s linear infinite; }
  .add-btn:hover::after { background: var(--accent-bg-hover); }

  .search-result-count { font-size: 0.78rem; color: var(--text-faint); margin: 8px 0 12px 4px; display: none; }

  /* Year sections */
  .year-section { margin-bottom: 6px; }
  .year-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px; cursor: pointer; user-select: none;
    background: var(--year-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--year-border);
    border-radius: 14px;
    transition: all .2s cubic-bezier(.16,1,.3,1);
    box-shadow: var(--year-shadow);
  }
  .year-header:hover { background: var(--year-bg-hover); box-shadow: var(--year-shadow-hover); transform: translateY(-1px); }
  .year-header.open { border-radius: 14px 14px 0 0; border-bottom-color: transparent; box-shadow: none; transform: none; }
  .year-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
  .year-count { font-size: 0.78rem; color: var(--text-faint); display: flex; align-items: center; gap: 8px; }
  .year-count .arrow { transition: transform .25s ease; font-size: 0.55rem; }
  .year-header.open .arrow { transform: rotate(180deg); }
  .book-list {
    display: none;
    border: 1px solid var(--book-list-border); border-top: none;
    border-radius: 0 0 14px 14px;
    background: var(--book-list-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    overflow: hidden;
  }
  .year-header.open + .book-list { display: block; }
  .book {
    padding: 9px 18px; display: flex; align-items: center; gap: 10px;
    transition: all .15s ease;
    border-bottom: 1px solid var(--book-border);
    position: relative;
  }
  .book:last-child { border-bottom: none; }
  .book:hover { background: var(--book-hover); }
  .book-num { font-size: 0.65rem; color: var(--text-num); min-width: 18px; text-align: right; font-variant-numeric: tabular-nums; }
  .book-title { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; flex: 1; min-width: 0; }
  .book-title .author { color: var(--text-primary); font-weight: 500; }
  .book-title mark { background: var(--mark-bg); color: var(--mark-color); border-radius: 3px; padding: 0 3px; }
  .no-results { text-align: center; padding: 48px 20px; color: var(--text-fainter); font-size: 0.92rem; }

  /* Book actions (edit/delete) */
  .book-actions {
    display: flex; gap: 3px; flex-shrink: 0; align-items: center;
    opacity: 0; transition: opacity .15s ease;
  }
  .book:hover .book-actions { opacity: 1; }
  .book-edit {
    width: 18px; height: 18px; border-radius: 5px; border: none;
    font-size: 0.6rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s ease; padding: 0; line-height: 1;
    background: var(--accent-bg); color: var(--accent);
  }
  .book-edit:hover { background: var(--accent-bg-hover); transform: scale(1.1); }
  .btn-delete {
    padding: 10px; font-size: 0.82rem; font-weight: 600;
    border: none; border-radius: 11px; cursor: pointer; transition: all .2s;
    background: var(--remove-bg); color: var(--remove-color); width: 100%; margin-top: 8px;
  }
  .btn-delete:hover { background: var(--remove-bg-hover); transform: translateY(-1px); }

  /* Wishlist */
  .wishlist-section { margin-top: 32px; }
  .wishlist-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .wishlist-title { font-size: 1.1rem; font-weight: 600; color: var(--wishlist-title); letter-spacing: -0.02em; }

// Theme toggle
(function initTheme() {
  const saved = localStorage.getItem('libros_theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateToggleIcon();
})();

function updateToggleIcon() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.innerHTML = isDark ? '&#9788;' : '&#9790;';
  btn.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('libros_theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('libros_theme', 'dark');
  }
  updateToggleIcon();
});

function getBooks() { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : defaultBooks; }
function saveBooks(b) { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); }
let books = getBooks();

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

// Edit mode state
let editMode = false;
let editYear = null;
let editIdx = null;

function init() {
  let total = 0;
  const ac = {};
  Object.values(books).forEach(l => { total += l.length; l.forEach(b => {
    const p = b.split(' - '); if (p.length >= 2) { const a = p[0].trim().split(',')[0].split('/')[0].split('&')[0].trim();
    if (a && !a.includes('Batman') && !a.includes('Liga') && !a.includes('DC') && !a.includes('Antologia') && !a.includes('Uniwersum') && !a.includes('ALLSTAR')) ac[a] = (ac[a]||0)+1; }
  }); });
  const top = Object.entries(ac).sort((a,b) => b[1]-a[1])[0];
  const yrs = Object.keys(books).sort((a,b) => +a - +b);
  const last = books[yrs[yrs.length-1]];
  const recent = last[last.length-1].split(' - ')[0].trim();
  document.getElementById('total-count').textContent = total;
  document.getElementById('fav-author').textContent = top ? top[0] : '';
  document.getElementById('recent-book').textContent = recent;
  document.getElementById('subtitle').textContent = total + ' books read since ' + yrs[0];
  renderBooks();
}

function renderBooks(filter = '') {
  const c = document.getElementById('content'), nr = document.getElementById('no-results'), rc = document.getElementById('result-count');
  c.innerHTML = ''; let tm = 0;
  Object.keys(books).sort((a,b) => +b - +a).forEach(year => {
    const allBooks = books[year];
    const fl = filter ? allBooks.filter(b => b.toLowerCase().includes(filter.toLowerCase())) : allBooks;
    if (!fl.length) return; tm += fl.length;
    const s = document.createElement('div'); s.className = 'year-section';
    const o = !!filter;
    s.innerHTML = `<div class="year-header ${o?'open':''}" onclick="this.classList.toggle('open')"><span class="year-title">${year}</span><span class="year-count">${fl.length} book${fl.length!==1?'s':''} <span class="arrow">&#9660;</span></span></div><div class="book-list">${fl.map((b,i) => {
      const origIdx = allBooks.indexOf(b);
      let d = b; if (filter) { const re = new RegExp('('+filter.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'); d = b.replace(re,'<mark>$1</mark>'); }
      const p = d.split(' - ');
      return `<div class="book" data-year="${year}" data-idx="${origIdx}"><span class="book-num">${i+1}</span><span class="book-title"><span class="author">${p[0]}</span> — ${p.slice(1).join(' — ')}</span><span class="book-actions"><button class="book-edit" onclick="editBook('${year}',${origIdx})" title="Edit">&#9998;</button></span></div>`;
    }).join('')}</div>`;
    c.appendChild(s);
  });
  if (filter) { rc.style.display='block'; rc.textContent=tm+' result'+(tm!==1?'s':''); nr.style.display=tm===0?'block':'none'; }
  else { rc.style.display='none'; nr.style.display='none'; }
}

// Edit book
function editBook(year, idx) {
  editMode = true;
  editYear = year;
  editIdx = idx;
  const entry = books[year][idx];
  const parts = entry.split(' - ');
  document.getElementById('modal-title').textContent = 'Edit book';
  document.getElementById('input-author').value = parts[0].trim();
  document.getElementById('input-title').value = parts.slice(1).join(' - ').trim();
  document.getElementById('btn-save').textContent = 'Save';
  document.getElementById('btn-modal-delete').style.display = 'block';
  modal.classList.add('open');
  setTimeout(() => document.getElementById('input-author').focus(), 100);
}

// Delete from edit modal
function deleteFromModal() {
  if (!editMode || !editYear) return;
  const entry = books[editYear][editIdx];
  const year = editYear;
  const idx = editIdx;
  books[year].splice(idx, 1);
  if (books[year].length === 0) delete books[year];
  saveBooks(books);
  resetModal();
  modal.classList.remove('open');
  init();
  toastUndo('Deleted: ' + entry.split(' - ')[0].trim(), () => {
    if (!books[year]) books[year] = [];
    books[year].splice(idx, 0, entry);
    saveBooks(books);
    init();
    toast('Restored!');
  });
}

// Toast with undo
let toastTimer = null;
function toastUndo(msg, undoFn) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${msg}</span><button class="toast-undo" id="undo-btn">UNDO</button>`;
  t.classList.add('show');
  document.getElementById('undo-btn').onclick = () => {
    clearTimeout(toastTimer);
    t.classList.remove('show');
    undoFn();
  };
  toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
}

// Reset modal to add mode
function resetModal() {
  editMode = false;
  editYear = null;
  editIdx = null;
  document.getElementById('modal-title').textContent = 'Add a book';
  document.getElementById('btn-save').textContent = 'Add';
  document.getElementById('btn-modal-delete').style.display = 'none';
  document.getElementById('input-author').value = '';
  document.getElementById('input-title').value = '';
}

document.getElementById('btn-save').addEventListener('click', () => {
  const a = document.getElementById('input-author').value.trim(), t = document.getElementById('input-title').value.trim();
  if (!a || !t) return;
  if (editMode) {
    // Update in place
    books[editYear][editIdx] = a + ' - ' + t;
    saveBooks(books);
    resetModal();
    modal.classList.remove('open');
    init();
    toast('Updated: ' + a + ' — ' + t);
  } else {
    const y = new Date().getFullYear().toString();
    if (!books[y]) books[y] = [];
    books[y].push(a + ' - ' + t); saveBooks(books);
    document.getElementById('input-author').value = ''; document.getElementById('input-title').value = '';
    modal.classList.remove('open'); init(); toast('Added: ' + a + ' — ' + t);
  }
});

// Export/Import
function exportData() {
  const data = { books: books, wishlist: wishlist };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'libros-backup-' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported data');
}

function importData() {
  document.getElementById('import-file').click();
}

document.getElementById('import-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.books) {
        books = data.books;
        saveBooks(books);
      }
      if (data.wishlist) {
        wishlist = data.wishlist;
        saveWishlist(wishlist);
      }
      init();
      renderWishlist();
      toast('Imported data successfully');
    } catch(err) {
      toast('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  this.value = '';
});

function renderWishlist() {
  const c = document.getElementById('wishlist-content');
  const cnt = document.getElementById('wish-count');
  cnt.textContent = wishlist.length ? wishlist.length + ' book' + (wishlist.length !== 1 ? 's' : '') : '';
  if (!wishlist.length) { c.innerHTML = '<p class="wishlist-empty">Your wishlist is empty. Add books you want to buy.</p>'; return; }
  c.innerHTML = wishlist.map((w, i) => {
    const isAuthorOnly = !w.title;
    const q = encodeURIComponent(isAuthorOnly ? w.author : w.author + ' ' + w.title);
    const plLinks = shops.pl.map(s => `<a class="shop-btn pl" href="${s.url(q)}" target="_blank" title="${s.name}">${s.name}</a>`).join('');
    const enLinks = shops.en.map(s => `<a class="shop-btn" href="${s.url(q)}" target="_blank" title="${s.name}">${s.name}</a>`).join('');
    const label = isAuthorOnly
      ? `<div class="wish-book">${w.author}</div><div class="wish-author">Browse all books</div>`
      : `<div class="wish-book">${w.title}</div><div class="wish-author">${w.author}</div>`;
    const doneBtn = isAuthorOnly ? '' : `<button class="wish-done" onclick="markRead(${i})" title="Mark as read">&#10003;</button>`;
    return `<div class="wish-item">
      <div class="wish-info">${label}</div>
      <div class="wish-actions">
        ${plLinks}${enLinks}
        ${doneBtn}
        <button class="wish-remove" onclick="removeWish(${i})" title="Remove">&#10005;</button>
      </div>
    </div>`;
  }).join('');
}

function markRead(i) {
  const w = wishlist[i];
  const y = new Date().getFullYear().toString();
  if (!books[y]) books[y] = [];
  books[y].push(w.author + ' - ' + w.title);
  saveBooks(books);
  wishlist.splice(i, 1);
  saveWishlist(wishlist);
  init();
  renderWishlist();
  toast('Moved to read: ' + w.author + ' — ' + w.title);
}

function removeWish(i) {
  const w = wishlist[i];
  wishlist.splice(i, 1);
  saveWishlist(wishlist);
  renderWishlist();
  toast('Removed: ' + w.title);
}

// Liquid glass hover — single press animation on enter, release on leave
function applyGlassHover(el, transformOnly) {
  el.addEventListener('mouseenter', e => {
    const rect = el.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
    const y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
    el.style.transition = 'transform .15s cubic-bezier(.2,.8,.3,1), background .2s, box-shadow .2s, border-color .2s';
    el.style.transform = `perspective(600px) rotateX(${y*-4}deg) rotateY(${x*4}deg) scale(0.97)`;
    if (!transformOnly) {
      el.style.background = getComputedStyle(document.documentElement).getPropertyValue('--glass-press-bg').trim();
      el.style.boxShadow = getComputedStyle(document.documentElement).getPropertyValue('--glass-press-shadow').trim();
      el.style.borderColor = getComputedStyle(document.documentElement).getPropertyValue('--glass-press-border').trim();
    }
    setTimeout(() => {
      el.style.transition = 'transform .5s cubic-bezier(.16,1,.3,1), background .4s, box-shadow .4s, border-color .4s';
      el.style.transform = `perspective(600px) rotateX(${y*-1.5}deg) rotateY(${x*1.5}deg) scale(1.01)`;
      if (!transformOnly) {
        el.style.boxShadow = getComputedStyle(document.documentElement).getPropertyValue('--glass-release-shadow').trim();
      }
    }, 150);
  });
  el.addEventListener('mouseleave', () => {
    el.style.transition = 'transform .6s cubic-bezier(.16,1,.3,1), background .4s, box-shadow .4s, border-color .4s';
    el.style.transform = '';
    if (!transformOnly) { el.style.background = ''; el.style.boxShadow = ''; el.style.borderColor = ''; }
  });
}
document.querySelectorAll('.glass').forEach(applyGlassHover);

  const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
  const y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
  logoEl.style.transition = 'transform .15s cubic-bezier(.2,.8,.3,1)';
  logoEl.style.transform = `perspective(600px) rotateX(${y*-6}deg) rotateY(${x*6}deg)`;
  setTimeout(() => {
    logoEl.style.transition = 'transform .5s cubic-bezier(.16,1,.3,1)';
    logoEl.style.transform = `perspective(600px) rotateX(${y*-2}deg) rotateY(${x*2}deg)`;
  }, 150);
});
logoEl.addEventListener('mouseleave', () => {
  logoEl.style.transition = 'transform .6s cubic-bezier(.16,1,.3,1)';
  logoEl.style.transform = '';
});

// Re-apply glass hover to wishlist items after render
const origRenderWishlist = renderWishlist;
renderWishlist = function() {
  origRenderWishlist();
  document.querySelectorAll('.wish-item').forEach(applyGlassHover);
};
renderWishlist();

// === GitHub Sync ===
const SYNC_REPO = 'unlikemenow/libros';
const SYNC_FILE = 'data.json';
const TOKEN_KEY = 'libros_gh_token';

function getToken() {
  // Check URL hash first, save to localStorage if found
  const hash = window.location.hash;
  if (hash.includes('token=')) {
    const t = hash.split('token=')[1].split('&')[0];
    if (t) localStorage.setItem(TOKEN_KEY, t);
    return t;
  }
  return localStorage.getItem(TOKEN_KEY);
}
function setToken(t) {
  localStorage.setItem(TOKEN_KEY, t);
  // Update URL hash so it can be bookmarked
  window.location.hash = 'token=' + t;
}

async function syncPull() {
  try {
    // Public repo — no token needed to read
    const res = await fetch(`https://raw.githubusercontent.com/${SYNC_REPO}/main/${SYNC_FILE}?t=${Date.now()}`);
    if (!res.ok) return false;
    const data = await res.json();
    if (data.books) { books = data.books; saveBooks(books); }
    if (data.wishlist) { wishlist = data.wishlist; saveWishlist(wishlist); }
    return true;
  } catch(e) { console.error('Pull failed:', e); return false; }
}

async function syncPush() {
  const token = getToken();
  if (!token) return false;
  try {
    const getRes = await fetch(`https://api.github.com/repos/${SYNC_REPO}/contents/${SYNC_FILE}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    let sha = '';
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
    const data = JSON.stringify({ books, wishlist }, null, 2);
    const body = { message: 'Sync books data', content: btoa(unescape(encodeURIComponent(data))) };
    if (sha) body.sha = sha;
    const putRes = await fetch(`https://api.github.com/repos/${SYNC_REPO}/contents/${SYNC_FILE}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (putRes.ok) { const r = await putRes.json(); localStorage.setItem('libros_sha', r.content.sha); }
    return putRes.ok;
  } catch(e) { console.error('Push failed:', e); return false; }
}

async function doSync() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('syncing');
  const token = getToken();
  if (token) {
    // Push local data first so we don't lose changes
    const pushed = await syncPush();
    toast(pushed ? 'Synced to cloud' : 'Sync failed — check token');
  } else {
    // No token — can only pull
    const pulled = await syncPull();
    if (pulled) { init_app(); renderWishlist(); }
    toast(pulled ? 'Loaded latest data' : 'Sync failed');
  }
  btn.classList.remove('syncing');
}

// Setup token — called from footer
function setupSync() {
  const existing = getToken();
  if (existing) {
    const link = window.location.origin + window.location.pathname + '#token=' + existing;
    prompt('Your magic link (bookmark on any device):', link);
    return;
  }
  const t = prompt('One-time setup:\\n\\n1. Go to github.com/settings/tokens\\n2. Generate new token (classic)\\n3. Check the \"repo\" scope\\n4. Paste here:');
  if (!t) return;
  setToken(t.trim());
  const link = window.location.origin + window.location.pathname + '#token=' + t.trim();
  prompt('Done! Bookmark this magic link for all your devices:', link);
  document.getElementById('sync-setup-link').textContent = 'Copy sync link';
  syncPush();
}

// Auto-push after saves (debounced, only if token set)
let pushTimer = null;
const _origSave = saveBooks;
saveBooks = function(b) { _origSave(b); if (getToken()) { clearTimeout(pushTimer); pushTimer = setTimeout(() => syncPush(), 1500); } };
const _origSaveW = saveWishlist;
saveWishlist = function(w) { _origSaveW(w); if (getToken()) { clearTimeout(pushTimer); pushTimer = setTimeout(() => syncPush(), 1500); } };

document.getElementById('sync-btn').addEventListener('click', doSync);
document.getElementById('sync-setup-link').textContent = getToken() ? 'Copy sync link' : 'Setup sync';

// On load: only pull from GitHub if no local data (fresh device)
function init_app() { init(); }
const hasLocalData = localStorage.getItem(STORAGE_KEY);
if (!hasLocalData) {
  // Fresh device — pull from GitHub
  syncPull().then(ok => { init_app(); renderWishlist(); });
} else {
  // Has local data — use it, auto-push will keep GitHub updated
  init_app();
}
</script>
